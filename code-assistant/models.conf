# Available models for the code-assistant.
# Format: NAME|HF_MODEL_ID|MODEL_DIR
#
# All entries point at pre-quantized OpenVINO IR published by the OpenVINO
# HuggingFace org — no local export step required. If you want to use a
# model that isn't pre-quantized, use export/export_model.sh to convert
# from a base Qwen/* repo and add an entry pointing at your local dir.

# --- Primary target: agentic coding on the iGPU ---
qwen3-coder-30b|OpenVINO/Qwen3-Coder-30B-A3B-Instruct-int4-ov|/models/qwen3-coder-30b-a3b-int4

# --- Smaller / dense alternatives ---
qwen25-coder-14b|OpenVINO/Qwen2.5-Coder-14B-Instruct-int4-ov|/models/qwen25-coder-14b-int4
qwen25-coder-7b|OpenVINO/Qwen2.5-Coder-7B-Instruct-int4-ov|/models/qwen25-coder-7b-int4

