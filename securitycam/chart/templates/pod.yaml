apiVersion: v1
kind: Pod
metadata:
  name: securitycam
  labels:
    app: securitycam
spec:
  restartPolicy: Never
  containers:
    - name: securitycam
      image: {{ .Values.image }}
      imagePullPolicy: Never
      args:
        {{- if eq .Values.mode "live" }}
        - "--cameras"
        - "/etc/securitycam/cameras.yaml"
        {{- else }}
        - "--test"
        {{- end }}
      ports:
        - containerPort: 8080
      env:
        - name: NEOReadDebugKeys
          value: "1"
        - name: ForcePreemptionMode
          value: "2"
      readinessProbe:
        httpGet:
          path: /status
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 2
      resources:
        requests:
          memory: {{ .Values.memory }}
          {{- if .Values.npu.enabled }}
          npu.intel.com/accel: "1"
          {{- end }}
          {{- if .Values.gpu.enabled }}
          gpu.intel.com/xe: "1"
          {{- end }}
        limits:
          memory: {{ .Values.memory }}
          {{- if .Values.npu.enabled }}
          npu.intel.com/accel: "1"
          {{- end }}
          {{- if .Values.gpu.enabled }}
          gpu.intel.com/xe: "1"
          {{- end }}
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        {{- if eq .Values.mode "live" }}
        - name: cameras
          mountPath: /etc/securitycam
          readOnly: true
        {{- end }}
  securityContext:
    runAsUser: 0
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 4Gi
    {{- if eq .Values.mode "live" }}
    - name: cameras
      secret:
        secretName: securitycam-cameras
    {{- end }}
