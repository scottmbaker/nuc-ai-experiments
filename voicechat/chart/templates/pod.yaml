apiVersion: v1
kind: Pod
metadata:
  name: voicechat
  labels:
    app: voicechat
spec:
  restartPolicy: Never
  containers:
    - name: voicechat
      image: {{ .Values.image }}
      imagePullPolicy: Never
      args:
        - "--model"
        - {{ .Values.modelDir | quote }}
        - "--whisper"
        - {{ .Values.whisperDir | quote }}
        - "--speaker"
        - {{ .Values.speaker | quote }}
        - "--tts-dir"
        - {{ .Values.ttsDir | quote }}
        - "--tts-device"
        - {{ .Values.ttsDevice | quote }}
        - "--device"
        - "GPU"
      ports:
        - containerPort: 8080
      resources:
        limits:
          memory: {{ .Values.memory | quote }}
          {{- if .Values.npu.enabled }}
          npu.intel.com/accel: 1
          {{- end }}
          {{- if .Values.gpu.enabled }}
          gpu.intel.com/xe: 1
          {{- end }}
        requests:
          {{- if .Values.npu.enabled }}
          npu.intel.com/accel: 1
          {{- end }}
          {{- if .Values.gpu.enabled }}
          gpu.intel.com/xe: 1
          {{- end }}
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 4Gi
